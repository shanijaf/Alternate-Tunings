<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open E & D Tuning App</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --fret-color: #cbd5e1;
            --string-color: #475569;
            --finger-color: #8b2e5f; /* Mirrored from your purple dots */
            --capo-color: #f59e0b;
        }

        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text-main); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .nav-bar { display: flex; gap: 10px; margin-bottom: 25px; background: white; padding: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .btn { padding: 10px 20px; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; font-weight: 600; background: white; transition: 0.2s; }
        .btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-capo.active { background: var(--capo-color); color: white; border-color: var(--capo-color); }
        
        .chord-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; width: 100%; max-width: 1100px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .chord-name { font-size: 1.4rem; margin: 0 0 12px 0; font-weight: 800; color: var(--text-main); }
        
        svg { width: 100%; max-width: 170px; height: auto; }
        .fb-string { stroke: var(--string-color); stroke-width: 1.5; }
        .fb-fret { stroke: var(--fret-color); stroke-width: 2; }
        .fb-nut { stroke: #334155; stroke-width: 6; }
        .fb-capo { stroke: var(--capo-color); stroke-width: 10; stroke-linecap: round; }
        .fb-label { font-size: 11px; fill: #64748b; font-weight: bold; }
        .fb-muted { font-size: 14px; fill: #64748b; font-weight: bold; text-anchor: middle; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="btn active" onclick="setTuning('E')">Open E</button>
        <button class="btn" onclick="setTuning('D')">Open D</button>
        <button class="btn btn-capo" id="capoBtn" onclick="toggleCapo()">Capo 2nd Fret</button>
    </div>

    <div id="chordGrid" class="chord-grid"></div>

    <script>
        let currentTuning = 'E';
        let capoActive = false;

        // -1 = Muted (X), 0 = Open (O), numbers = fret position
        const chordData = {
            'E': {
                labels: ['E','B','E','G#','B','E'],
                chords: [
                    { name: "E Major", p: [0,0,0,0,0,0] },
                    { name: "A7", p: [-1,-1,0,1,2,3] }, // Mirrored from your first image
                    { name: "B7", p: [-1,-1,3,3,4,5] }, // Mirrored from your second image
                    { name: "Emaj7", p: [0,0,1,1,1,0] },
                    { name: "A Major", p: [5,5,5,5,5,5] },
                    { name: "A(9)", p: [0,0,2,1,2,0] },
                    { name: "B7sus", p: [0,2,2,2,0,0] },
                    { name: "B7sus/C#", p: [0,4,2,2,0,0] },
                    { name: "G Major", p: [3,3,3,3,3,3] }
                ]
            },
            'D': {
                labels: ['D','A','D','F#','A','D'],
                chords: [
                    { name: "D Major", p: [0,0,0,0,0,0] },
                    { name: "G Major", p: [5,5,5,5,5,5] },
                    { name: "A Major", p: [7,7,7,7,7,7] }
                ]
            }
        };

        function setTuning(t) {
            currentTuning = t;
            document.querySelectorAll('.btn').forEach(b => { if(b.id !== 'capoBtn') b.classList.remove('active'); });
            event.target.classList.add('active');
            render();
        }

        function toggleCapo() {
            capoActive = !capoActive;
            document.getElementById('capoBtn').classList.toggle('active');
            render();
        }

        function render() {
            const grid = document.getElementById('chordGrid');
            grid.innerHTML = '';
            const data = chordData[currentTuning];

            data.chords.forEach(chord => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<h2 class="chord-name">${chord.name}</h2>${drawSVG(chord.p, data.labels)}`;
                grid.appendChild(card);
            });
        }

        function drawSVG(p, labels) {
            const width = 200, height = 260, margin = {t: 40, r: 20, b: 40, l: 40};
            const sw = (width - margin.l - margin.r) / 5;
            const fh = (height - margin.t - margin.b) / 5;

            // Find lowest fret to determine window (excluding 0 and -1)
            const pressedFrets = p.filter(f => f > 0);
            const minFret = pressedFrets.length ? Math.min(...pressedFrets) : 1;
            const startFret = minFret > 1 ? minFret : 1;

            let svg = `<svg viewBox="0 0 ${width} ${height}">`;
            
            // Draw 5 frets
            for(let i=0; i<=5; i++) {
                const y = margin.t + (i * fh);
                const isNut = (i === 0 && startFret === 1 && !capoActive);
                svg += `<line x1="${margin.l}" y1="${y}" x2="${width-margin.r}" y2="${y}" class="${isNut ? 'fb-nut' : 'fb-fret'}" />`;
                if(i > 0) {
                    const fretNum = capoActive ? (startFret + i + 1) : (startFret + i - 1);
                    svg += `<text x="${margin.l-10}" y="${y-(fh/2)}" class="fb-label" text-anchor="end">${fretNum}</text>`;
                }
            }

            // Capo logic
            if(capoActive && startFret === 1) {
                svg += `<line x1="${margin.l-5}" y1="${margin.t}" x2="${width-margin.r+5}" y2="${margin.t}" class="fb-capo" />`;
            }

            p.forEach((pos, i) => {
                const x = margin.l + (i * sw);
                svg += `<line x1="${x}" y1="${margin.t}" x2="${x}" y2="${height-margin.b}" class="fb-string" />`;
                svg += `<text x="${x}" y="${height-15}" class="fb-label" text-anchor="middle">${labels[i]}</text>`;

                if(pos === -1) {
                    // Muted string (X)
                    svg += `<text x="${x}" y="${margin.t-12}" class="fb-muted">X</text>`;
                } else if(pos === 0) {
                    // Open string (O)
                    svg += `<circle cx="${x}" cy="${margin.t-12}" r="5" fill="none" stroke="#64748b" />`;
                } else {
                    // Finger Position
                    const relativeY = pos - startFret + 1;
                    if(relativeY > 0 && relativeY <= 5) {
                        const y = margin.t + (relativeY * fh) - (fh/2);
                        svg += `<circle cx="${x}" cy="${y}" r="9" fill="var(--finger-color)" />`;
                    }
                }
            });

            return svg + `</svg>`;
        }

        render();
    </script>
</body>
</html>
