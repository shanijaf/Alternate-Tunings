<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open E Cloud - Capo 2 Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #0284c7; --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --finger: #8b2e5f; --capo: #f59e0b; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header-box { text-align: center; margin-bottom: 30px; }
        .capo-badge { background: var(--capo); color: white; padding: 4px 12px; border-radius: 99px; font-weight: bold; font-size: 0.8rem; }
        
        .chord-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; width: 100%; max-width: 1000px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .chord-card { text-align: center; padding: 15px; border: 1px solid #f1f5f9; border-radius: 8px; position: relative; }
        
        .controls { margin-top: 30px; display: flex; gap: 15px; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .btn-pdf { background: #10b981; color: white; }
        .btn-pdf:hover { background: #059669; }

        svg { width: 100%; max-width: 160px; height: auto; }
        .fb-fret { stroke: #cbd5e1; stroke-width: 2; }
        .fb-nut { stroke: var(--capo); stroke-width: 6; } /* Capo highlighted at nut position */
    </style>
</head>
<body>

    <div class="header-box">
        <h1 style="margin-bottom: 5px;">Open E Cloud</h1>
        <span class="capo-badge">CAPO 2ND FRET ACTIVE</span>
        <p style="color: #64748b; font-size: 0.9rem; margin-top: 15px;">A custom library synthesized from your Joni Mitchell references and blues tabs[cite: 4, 20].</p>
    </div>

    <div id="printArea" class="chord-grid">
        </div>

    <div class="controls">
        <button class="btn btn-pdf" onclick="generatePDF()">Download "Open E Cloud" PDF</button>
    </div>

    <script>
        // Library synthesized from provided Joni Mitchell PDF [cite: 4] and Blues Images [cite: 14]
        // Note: Chord names are adjusted for the +2 semitone Capo shift
        const cloudLibrary = [
            { name: "F# Major (Open E Shape)", p: [0,0,0,0,0,0] },
            { name: "B7 (Shape) / C#7", p: [-1,-1,0,1,2,3] },
            { name: "F#maj7", p: [0,0,1,1,1,0] },
            { name: "B(9) / C#(9)", p: [0,0,2,1,2,0] },
            { name: "G#m11", p: [2,0,1,0,0,0] },
            { name: "C#7sus/D#", p: [0,4,2,2,0,0] },
            { name: "C#7 (Blues Box)", p: [-1,-1,3,3,4,5] },
            { name: "A Major / B Major", p: [5,5,5,5,5,5] }
        ];

        function renderGrid() {
            const grid = document.getElementById('chordGrid');
            const container = document.getElementById('printArea');
            container.innerHTML = '';
            
            cloudLibrary.forEach(chord => {
                const card = document.createElement('div');
                card.className = 'chord-card';
                card.innerHTML = `
                    <div style="font-weight:bold; font-size:1.1rem; margin-bottom:5px;">${chord.name}</div>
                    ${drawSVG(chord.p)}
                `;
                container.appendChild(card);
            });
        }

        function drawSVG(p) {
            const width = 200, height = 240, m = 35;
            const sw = (width - 2*m) / 5;
            const fh = (height - 2*m) / 5;
            let svg = `<svg viewBox="0 0 ${width} ${height}">`;
            
            // Frets
            for(let i=0; i<=5; i++) {
                const y = m + (i * fh);
                const isCapo = i === 0;
                svg += `<line x1="${m}" y1="${y}" x2="${width-m}" y2="${y}" class="${isCapo?'fb-nut':'fb-fret'}" stroke-linecap="round" />`;
                if (i > 0) svg += `<text x="${m-12}" y="${y-(fh/2)}" font-size="10" fill="#94a3b8">${i+2}</text>`; // Reflects capo at fret 2
            }

            p.forEach((pos, i) => {
                const x = m + (i * sw);
                svg += `<line x1="${x}" y1="${m}" x2="${x}" y2="${height-m}" stroke="#475569" stroke-width="1.5" />`;
                
                if(pos === -1) {
                    svg += `<text x="${x}" y="${m-12}" font-size="14" font-weight="bold" text-anchor="middle" fill="#ef4444">X</text>`;
                } else if(pos === 0) {
                    svg += `<circle cx="${x}" cy="${m-12}" r="5" fill="none" stroke="#f59e0b" stroke-width="2" />`; // Capo color for open strings
                } else {
                    const y = m + (pos * fh) - (fh/2);
                    svg += `<circle cx="${x}" cy="${y}" r="9" fill="#8b2e5f" />`;
                    svg += `<text x="${x}" y="${y}" fill="white" font-size="8" font-weight="bold" text-anchor="middle" alignment-baseline="central">${pos}</text>`;
                }
            });
            return svg + `</svg>`;
        }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const canvas = await html2canvas(document.getElementById('printArea'), { scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            const pdfWidth = doc.internal.pageSize.getWidth();
            const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
            
            doc.text("Open E Cloud - Capo 2nd Fret", 15, 15);
            doc.addImage(imgData, 'PNG', 0, 20, pdfWidth, pdfHeight);
            doc.save('Open_E_Cloud_Capo2.pdf');
        }

        renderGrid();
    </script>
</body>
</html>
