<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open E Tuning Chord Deck</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --bg: #f4f4f9;
        }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        /* The Card Container */
        .card-container { perspective: 1000px; width: 320px; height: 450px; cursor: pointer; }
        .card { 
            position: relative; width: 100%; height: 100%; text-align: center; 
            transition: transform 0.6s; transform-style: preserve-3d; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 15px;
        }
        .card.is-flipped { transform: rotateY(180deg); }

        /* Front & Back Styles */
        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: white; border-radius: 15px; border: 2px solid var(--primary);
        }
        .card-back { transform: rotateY(180deg); background: #fffdf0; }

        h2 { color: var(--primary); margin: 10px 0; }
        .fretboard { width: 200px; height: 280px; border: 1px solid #ddd; position: relative; background: #fafafa; }
        
        /* Simple Fretboard Graphic Simulation */
        .string { position: absolute; background: #888; width: 2px; height: 100%; }
        .fret { position: absolute; background: #ccc; width: 100%; height: 2px; }

        button {
            margin-top: 30px; padding: 12px 25px; font-size: 16px;
            background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer;
        }
        button:hover { background: var(--accent); }
    </style>
</head>
<body>

    <div class="card-container" onclick="this.querySelector('.card').classList.toggle('is-flipped')">
        <div class="card" id="card-inner">
            <div class="card-face card-front">
                <h2 id="chord-name">A Major</h2>
                <p>Identify the shape for Open E</p>
                <div class="fretboard" id="empty-fretboard">
                    </div>
            </div>
            <div class="card-face card-back">
                <h2>Solution</h2>
                <div id="solution-text" style="font-size: 24px; font-weight: bold; color: var(--accent);">5-5-5-5-5-5</div>
                <p>Full Bar at 5th Fret</p>
            </div>
        </div>
    </div>

    <button onclick="nextCard(event)">Next Chord</button>

    <script>
        const deck = [
            { name: "E Major", solution: "0-0-0-0-0-0", note: "Open Strings" },
            { name: "A Major", solution: "5-5-5-5-5-5", note: "IV Chord" },
            { name: "B Major", solution: "7-7-7-7-7-7", note: "V Chord" },
            { name: "E Octave", solution: "12-12-12-12-12-12", note: "12th Fret Bar" }
        ];

        let currentIndex = 0;

        function nextCard(event) {
            event.stopPropagation(); // Prevents flipping when clicking the button
            const card = document.getElementById('card-inner');
            card.classList.remove('is-flipped');
            
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % deck.length;
                document.getElementById('chord-name').innerText = deck[currentIndex].name;
                document.getElementById('solution-text').innerText = deck[currentIndex].solution;
            }, 200);
        }

        // Generate visual strings for the "blank" fretboard
        const fb = document.getElementById('empty-fretboard');
        for(let i=0; i<6; i++) {
            let s = document.createElement('div');
            s.className = 'string';
            s.style.left = (i * 20 + 50) + 'px';
            fb.appendChild(s);
        }
    </script>
</body>
</html>
