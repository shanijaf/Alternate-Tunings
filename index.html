<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open D Tuning Chord Explorer</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .tuning-info {
            background: #e2e8f0;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .chord-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .chord-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: transform 0.2s;
            border: 1px solid #e2e8f0;
        }

        .chord-card:hover {
            transform: translateY(-5px);
        }

        .chord-name {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--primary);
            text-align: center;
        }

        /* Fretboard Graph Styling */
        .fretboard {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(5, 30px);
            border: 2px solid #334155;
            position: relative;
            background: #fff;
        }

        .fret-line {
            border-bottom: 1px solid #cbd5e1;
            grid-column: 1 / span 6;
        }

        .string {
            border-right: 1px solid #94a3b8;
            height: 100%;
            position: relative;
        }

        .string:last-child { border-right: none; }

        .dot {
            width: 18px;
            height: 18px;
            background: var(--primary);
            border-radius: 50%;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .open-marker {
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Open D Explorer</h1>
        <div class="tuning-info">D - A - D - F# - A - D</div>
        <p>Common chord shapes for Open D tuning.</p>
    </div>

    <div class="chord-grid" id="chordGrid">
        </div>

    <script>
        const chords = [
            { name: "D Major", positions: [0, 0, 0, 0, 0, 0], type: "Open" },
            { name: "G Major", positions: [5, 5, 5, 5, 5, 5], type: "Barre" },
            { name: "A Major", positions: [7, 7, 7, 7, 7, 7], type: "Barre" },
            { name: "Bm (Relative Minor)", positions: [0, 2, 0, 0, 2, 0], type: "Shape" },
            { name: "D7", positions: [0, 0, 0, 1, 0, 0], type: "Dominant" },
            { name: "G/D", positions: [0, 2, 0, 1, 2, 0], type: "V-Shape" }
        ];

        function createChordCard(chord) {
            const card = document.createElement('div');
            card.className = 'chord-card';
            
            let fretboardHTML = '<div class="fretboard">';
            // Create 4 frets
            for (let f = 0; f < 4; f++) {
                fretboardHTML += '<div class="fret-line" style="grid-row: ' + (f + 1) + '"></div>';
            }
            
            // Add dots based on positions
            // For simplicity, this visualizer shows positions relative to the start of the shape
            const baseFret = Math.min(...chord.positions.filter(p => p > 0)) || 0;
            
            chord.positions.forEach((pos, stringIndex) => {
                fretboardHTML += `<div class="string" style="grid-column: ${stringIndex + 1}; grid-row: 1 / span 5">`;
                if (pos > 0) {
                    const displayFret = pos === 0 ? 0 : (pos - (baseFret > 0 ? baseFret - 1 : 0));
                    fretboardHTML += `<div class="dot" style="top: ${(displayFret * 30) - 15}px">${pos}</div>`;
                }
                fretboardHTML += '</div>';
            });

            fretboardHTML += '</div>';

            card.innerHTML = `
                <div class="open-marker">${chord.positions.join(' ')}</div>
                <div class="chord-name">${chord.name}</div>
                ${fretboardHTML}
                <p style="text-align:center; font-size: 0.8rem; color: #64748b; margin-top:10px;">${chord.type}</p>
            `;
            return card;
        }

        const container = document.getElementById('chordGrid');
        chords.forEach(c => container.appendChild(createChordCard(c)));
    </script>
</body>
</html>
